name: Update t2gentoo-kernel

on:
  schedule:
  - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: update-t2gentoo-kernel
  cancel-in-progress: false

jobs:
  update-ebuilds:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout overlay
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: t2-overlay

      - name: Run update inside Gentoo container
        env:
          KERNEL_BRANCHES: "${{ vars.KERNEL_BRANCHES }}"
        run: |
          set -euo pipefail
          docker --version
          # gentoo/stage3 pinned digest.
          docker run --rm \
            -v "${{ github.workspace }}/t2-overlay:/workspace" \
            -w /workspace \
            -e KERNEL_BRANCHES \
            gentoo/stage3@sha256:ed25f59f219c7e48601e19048b3d0b91a4d471868e4413d4fddb5a81d9d0fe49 \
            /bin/bash -c "set -euo pipefail; getuto; emerge-webrsync -q; emerge -qg dev-vcs/git; python3 scripts/update_kernel.py"

      - name: Commit and push changes
        run: |
          set -euo pipefail
          cd t2-overlay
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add sys-kernel/t2gentoo-kernel/
          git add virtual/dist-kernel/


          if ! git diff --staged --quiet; then
            if [ -f commit_message.txt ]; then
              git commit -F commit_message.txt
              rm commit_message.txt
            else
              git commit -m "Auto-update t2gentoo-kernel ebuilds and manifests"
            fi
            git push
            echo "Changes pushed successfully."
          else
            echo "No changes to commit."
          fi
